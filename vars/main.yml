---
# role: bind
# file: vars/main.yml

# Native validation command for the main BIND configuration file.
__bind_checkconf_command: "named-checkconf %s"

# Native validation command for managed authoritative zone files.
__bind_checkzone_command: "named-checkzone"

# Native SOA serial marker used by managed zone files.
__bind_zone_serial_regexp: '(?m)^([ \t]*)([0-9]+)([ \t]*;[ \t]*[Ss]erial[ \t]*)$'

# Internal mapping from zone type and dynamic flag to the platform target class.
__bind_zone_target_classes:
  primary:
    false: "static"
    true: "dynamic"
  secondary:
    false: "secondary"
