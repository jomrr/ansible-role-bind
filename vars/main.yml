---
# role: bind
# file: vars/main.yml

# Native validation command for the main BIND configuration file.
__bind_checkconf_command: "named-checkconf %s"

# Native validation command for managed authoritative zone files.
__bind_checkzone_command: "named-checkzone"

# Package-native platform options rendered before public bind_options.
__bind_options:
  - name: "directory"
    value: >-
      {{ bind_option_directory |
         default(__bind_default_option_directory) }}
    quote: true
  - name: "managed-keys-directory"
    value: >-
      {{ bind_option_managed_keys_directory |
         default(__bind_default_option_managed_keys_directory) }}
    quote: true
  - name: "dump-file"
    value: >-
      {{ bind_option_dump_file |
         default(__bind_default_option_dump_file) }}
    quote: true
  - name: "memstatistics-file"
    value: >-
      {{ bind_option_memstatistics_file |
         default(__bind_default_option_memstatistics_file) }}
    quote: true
  - name: "recursing-file"
    value: >-
      {{ bind_option_recursing_file |
         default(__bind_default_option_recursing_file) }}
    quote: true
  - name: "secroots-file"
    value: >-
      {{ bind_option_secroots_file |
         default(__bind_default_option_secroots_file) }}
    quote: true
  - name: "statistics-file"
    value: >-
      {{ bind_option_statistics_file |
         default(__bind_default_option_statistics_file) }}
    quote: true
  - name: "pid-file"
    value: >-
      {{ bind_option_pid_file |
         default(__bind_default_option_pid_file) }}
    quote: true
  - name: "session-keyfile"
    value: >-
      {{ bind_option_session_keyfile |
         default(__bind_default_option_session_keyfile) }}
    quote: true

# Platform-specific options rendered after common internal options.
__bind_platform_options: []

# Directories required by the rendered configuration.
__bind_directories:
  - path: "{{ __bind_conf_dir }}"
    owner: root
    group: "{{ __bind_group }}"
    mode: "0755"
  - path: "{{ __bind_run_dir }}"
    owner: "{{ __bind_user }}"
    group: "{{ __bind_group }}"
    mode: "0755"
  - path: "{{ __bind_data_dir }}"
    owner: "{{ __bind_user }}"
    group: "{{ __bind_group }}"
    mode: "0755"
  - path: "{{ __bind_managed_keys_dir }}"
    owner: "{{ __bind_user }}"
    group: "{{ __bind_group }}"
    mode: "0755"
  - path: "{{ __bind_log_dir }}"
    owner: "{{ __bind_user }}"
    group: "{{ __bind_group }}"
    mode: "0755"
