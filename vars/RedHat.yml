---
# role: bind
# file: vars/RedHat.yml

# Packages for bind
__bind_packages:
  - "bind"
  - "bind-dnssec-utils"
  - "bind-utils"

# Service name for bind
__bind_service_name: "named"

# User and group name for bind
__bind_user: "named"
__bind_group: "named"

# Directory for managed TSIG key files.
__bind_tsig_key_dir: "/etc/named"

# Platform-native zone file targets.
__bind_zone_targets:
  static:
    path: "/var/named"
    owner: "root"
    group: "{{ __bind_group }}"
    mode: "0640"
    force: true
  dynamic:
    path: "/var/named/dynamic"
    owner: "{{ __bind_user }}"
    group: "{{ __bind_group }}"
    mode: "0640"
    force: false
  secondary:
    path: "/var/named/slaves"

# Main configuration file for bind
__bind_conf_file: "/etc/named.conf"

# Platform zones rendered into named.conf.
__bind_platform_zones:
  - name: "."
    class: "IN"
    type: "hint"
    file: "/etc/named.ca"

# Red Hat crypto policy include rendered inside the options block.
__bind_platform_options:
  - include: "/etc/crypto-policies/back-ends/bind.config"

# Default included config files
__bind_includes:
  - "/etc/named.rfc1912.zones"
  - "/etc/named.root.key"

# Native BIND option values from Red Hat-family bind packages.
__bind_options:
  - name: "directory"
    value: '"/var/named"'
  - name: "managed-keys-directory"
    value: '"/var/named/dynamic"'
  - name: "dump-file"
    value: '"/var/named/data/cache_dump.db"'
  - name: "memstatistics-file"
    value: '"/var/named/data/named_mem_stats.txt"'
  - name: "recursing-file"
    value: '"/var/named/data/named.recursing"'
  - name: "secroots-file"
    value: '"/var/named/data/named.secroots"'
  - name: "statistics-file"
    value: '"/var/named/data/named_stats.txt"'
  - name: "pid-file"
    value: '"/run/named/named.pid"'
  - name: "session-keyfile"
    value: '"/run/named/session.key"'

# Native BIND logging values from Red Hat-family bind packages.
__bind_logging:
  channels:
    - name: "default_debug"
      file: "data/named.run"
      severity: "dynamic"
  categories: []
