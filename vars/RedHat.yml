---
# role: bind
# file: vars/RedHat.yml

# Packages for bind
__bind_packages:
  - "bind"
  - "bind-dnssec-utils"
  - "bind-utils"

# Service name for bind
__bind_service_name: "named"

# User and group name for bind
__bind_user: "named"
__bind_group: "named"

# Configuration directory for bind
__bind_conf_dir: "/etc/named"

# Main configuration file for bind
__bind_conf_file: "/etc/named.conf"

# Red Hat keeps options and logging in named.conf.
__bind_main_config_style: "standalone"

# Managed local include file.
__bind_local_file: "/etc/named/named.conf.local"

# Platform zones rendered into named.conf.
__bind_platform_zones:
  - name: "."
    class: "IN"
    type: "hint"
    file: "/etc/named.ca"

# Configuration files managed by this role.
__bind_config_files:
  - src: "named.conf.local.j2"
    dest: "{{ __bind_local_file }}"
  - src: "named.conf.j2"
    dest: "{{ __bind_conf_file }}"
    validate: "{{ __bind_checkconf_command }}"

# Zone files directory for bind
__bind_dir: "/var/named"

# Red Hat crypto policy include rendered inside the options block.
__bind_platform_options:
  - include: "/etc/crypto-policies/back-ends/bind.config"

# Default included config files
__bind_includes:
  - "/etc/named.rfc1912.zones"
  - "/etc/named.root.key"

# BIND log dir
__bind_log_dir: "/var/log/named"

# Run dir
__bind_run_dir: "/run/named"

# BIND data dir
__bind_data_dir: "/var/named/data"

# Managed keys directory
__bind_managed_keys_dir: "/var/named/dynamic"

# Native BIND option defaults from Red Hat-family bind packages.
__bind_default_option_directory: "/var/named"
__bind_default_option_managed_keys_directory: "/var/named/dynamic"
__bind_default_option_dump_file: "/var/named/data/cache_dump.db"
__bind_default_option_memstatistics_file: "/var/named/data/named_mem_stats.txt"
__bind_default_option_recursing_file: "/var/named/data/named.recursing"
__bind_default_option_secroots_file: "/var/named/data/named.secroots"
__bind_default_option_statistics_file: "/var/named/data/named_stats.txt"
__bind_default_option_pid_file: "/run/named/named.pid"
__bind_default_option_session_keyfile: "/run/named/session.key"
