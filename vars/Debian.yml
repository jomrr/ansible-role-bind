---
# role: bind
# file: vars/Debian.yml

# Packages for bind
__bind_packages:
  - "bind9"
  - "bind9-dnsutils"
  - "bind9-utils"
  - "dns-root-data"

# Service name for bind
__bind_service_name: "bind9"

# User and group name for bind
__bind_user: "bind"
__bind_group: "bind"

# Configuration directory for bind
__bind_conf_dir: "/etc/bind"

# Main configuration file for bind
__bind_conf_file: "/etc/bind/named.conf"

# Debian keeps named.conf as an include-only entry point.
__bind_main_config_style: "include"

# Managed options include file.
__bind_options_file: "/etc/bind/named.conf.options"

# Managed local include file.
__bind_local_file: "/etc/bind/named.conf.local"

# Includes rendered into the Debian entry point.
__bind_main_includes:
  - "{{ __bind_options_file }}"
  - "{{ __bind_local_file }}"
  - "/etc/bind/named.conf.root-hints"

# Debian keeps package-provided zones in included files.
__bind_platform_zones: []

# Configuration files managed by this role.
__bind_config_files:
  - src: "named.conf.options.j2"
    dest: "{{ __bind_options_file }}"
  - src: "named.conf.local.j2"
    dest: "{{ __bind_local_file }}"
  - src: "named.conf.j2"
    dest: "{{ __bind_conf_file }}"
    validate: "{{ __bind_checkconf_command }}"

# Zone files directory for bind
__bind_dir: "/var/cache/bind"

# Platform include files rendered by the standalone main configuration.
__bind_includes: []

# BIND log dir
__bind_log_dir: "/var/log/bind"

# Run dir
__bind_run_dir: "/var/run/named"

# BIND data dir
__bind_data_dir: "/var/cache/bind/data"

# Managed keys directory
__bind_managed_keys_dir: "/var/cache/bind"

# Native BIND option defaults from the Debian and Ubuntu bind9 packages.
__bind_default_option_directory: "/var/cache/bind"
__bind_default_option_managed_keys_directory:
__bind_default_option_dump_file:
__bind_default_option_memstatistics_file:
__bind_default_option_recursing_file:
__bind_default_option_secroots_file:
__bind_default_option_statistics_file:
__bind_default_option_pid_file:
__bind_default_option_session_keyfile:
