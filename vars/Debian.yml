---
# role: bind
# file: vars/Debian.yml

# Packages for bind
__bind_packages:
  - "bind9"
  - "bind9-dnsutils"
  - "bind9-utils"
  - "dns-root-data"

# Service name for bind
__bind_service_name: "bind9"

# User and group name for bind
__bind_user: "bind"
__bind_group: "bind"

# Configuration directory for bind
__bind_conf_dir: "/etc/bind"

# Main configuration file for bind
__bind_conf_file: "/etc/bind/named.conf"

# Debian keeps named.conf as an include-only entry point.
__bind_main_config_style: "include"

# Managed options include file.
__bind_options_file: "/etc/bind/named.conf.options"

# Managed local include file.
__bind_local_file: "/etc/bind/named.conf.local"

# Includes rendered into the Debian entry point.
__bind_main_includes:
  - "{{ __bind_options_file }}"
  - "{{ __bind_local_file }}"
  - "/etc/bind/named.conf.root-hints"

# Debian keeps package-provided zones in included files.
__bind_platform_zones: []

# Configuration files managed by this role.
__bind_config_files:
  - src: "named.conf.options.j2"
    dest: "{{ __bind_options_file }}"
  - src: "named.conf.local.j2"
    dest: "{{ __bind_local_file }}"
  - src: "named.conf.j2"
    dest: "{{ __bind_conf_file }}"
    validate: "{{ __bind_checkconf_command }}"

# Zone files directory for bind
__bind_dir: "/var/cache/bind"

# Platform-specific options rendered before public bind_options.
__bind_options:
  - name: "directory"
    value: '"{{ __bind_dir }}"'
  - name: "managed-keys-directory"
    value: '"{{ __bind_managed_keys_dir }}"'
  - name: "dump-file"
    value: '"{{ __bind_data_dir }}/cache_dump.db"'
  - name: "memstatistics-file"
    value: '"{{ __bind_data_dir }}/named_mem_stats.txt"'
  - name: "recursing-file"
    value: '"{{ __bind_data_dir }}/named.recursing"'
  - name: "secroots-file"
    value: '"{{ __bind_data_dir }}/named.secroots"'
  - name: "statistics-file"
    value: '"{{ __bind_data_dir }}/named_stats.txt"'
  - name: "pid-file"
    value: '"{{ __bind_run_dir }}/named.pid"'
  - name: "session-keyfile"
    value: '"{{ __bind_run_dir }}/session.key"'

# Platform include files rendered by the standalone main configuration.
__bind_includes: []

# BIND log dir
__bind_log_dir: "/var/log/bind"

# Run dir
__bind_run_dir: "/var/run/named"

# BIND data dir
__bind_data_dir: "/var/cache/bind/data"

# Managed keys directory
__bind_managed_keys_dir: "/var/cache/bind"

# Directories required by the rendered configuration.
__bind_directories:
  - path: "{{ __bind_conf_dir }}"
    owner: root
    group: "{{ __bind_group }}"
    mode: "0755"
  - path: "{{ __bind_run_dir }}"
    owner: "{{ __bind_user }}"
    group: "{{ __bind_group }}"
    mode: "0755"
  - path: "{{ __bind_data_dir }}"
    owner: "{{ __bind_user }}"
    group: "{{ __bind_group }}"
    mode: "0755"
  - path: "{{ __bind_managed_keys_dir }}"
    owner: "{{ __bind_user }}"
    group: "{{ __bind_group }}"
    mode: "0755"
  - path: "{{ __bind_log_dir }}"
    owner: "{{ __bind_user }}"
    group: "{{ __bind_group }}"
    mode: "0755"
