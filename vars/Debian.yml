---
# role: bind
# file: vars/Debian.yml

# Packages for bind
__bind_packages:
  - "bind9"
  - "bind9-dnsutils"
  - "bind9-utils"
  - "dns-root-data"

# Service name for bind
__bind_service_name: "bind9"

# User and group name for bind
__bind_user: "bind"
__bind_group: "bind"

# Directory for managed TSIG key files.
__bind_tsig_key_dir: "/etc/bind"

# Platform-native zone file targets.
__bind_zone_targets:
  static:
    path: "/etc/bind"
    owner: "root"
    group: "{{ __bind_group }}"
    mode: "0640"
  dynamic:
    path: "/var/lib/bind"
    owner: "{{ __bind_user }}"
    group: "{{ __bind_group }}"
    mode: "0640"
  secondary:
    path: "/var/cache/bind"

# Main configuration file for bind
__bind_conf_file: "/etc/bind/named.conf"

# Managed options include file.
__bind_options_file: "/etc/bind/named.conf.options"

# Managed local include file.
__bind_local_file: "/etc/bind/named.conf.local"

# Includes rendered into the Debian entry point.
__bind_main_includes:
  - "{{ __bind_options_file }}"
  - "{{ __bind_local_file }}"
  - "/etc/bind/named.conf.root-hints"

# Debian keeps package-provided zones in included files.
__bind_platform_zones: []

# Platform include files rendered by the standalone main configuration.
__bind_includes: []

# Debian has no package-native option-level includes inside named.conf.options.
__bind_platform_options: []

# Native BIND option values from Debian and Ubuntu bind9 packages.
__bind_options:
  - name: "directory"
    value: '"/var/cache/bind"'

# Debian and Ubuntu bind9 packages do not configure explicit logging by default.
__bind_logging:
  channels: []
  categories: []
