---
# role: bind
# file: meta/argument_specs.yml

argument_specs:
  main:
    short_description: Set up the ISC BIND DNS Server.
    description:
      - Installs ISC BIND packages and renders the main BIND configuration.
      - Enables and starts the BIND service.
      - Restarts the BIND service after configuration changes.
      - The role interface models TSIG keys, encrypted listeners, BIND configuration blocks,
        DDNS update policies, and zone declarations.
    options:
      bind_tsig_keys:
        type: list
        elements: dict
        required: false
        default: []
        description:
          - TSIG key declarations included from the managed local BIND configuration.
          - Store real secrets in Ansible Vault.
        options:
          name:
            type: str
            required: true
            description: TSIG key name and key file stem.
          algorithm:
            type: str
            required: true
            description: TSIG algorithm used for the key, for example hmac-sha256.
          secret:
            type: str
            required: false
            no_log: true
            description: Base64-encoded TSIG secret.
      bind_acls:
        type: list
        elements: dict
        required: false
        description:
          - Named BIND ACL declarations.
          - The default includes local, my_addresses, and bogons ACLs.
          - The my_addresses ACL is referenced by the default deny-answer-addresses option
            for recursive resolver hardening.
          - The bogons ACL is referenced by the default blackhole option and excludes loopback,
            private, shared, and ULA ranges commonly used by local clients.
        options:
          name:
            type: str
            required: true
            description: ACL name.
          entries:
            type: list
            elements: raw
            required: true
            description: Address match list entries.
      bind_primaries:
        type: list
        elements: dict
        required: false
        default: []
        description: Named BIND primaries lists for secondary zones.
        options:
          name:
            type: str
            required: true
            description: Primaries list name.
          entries:
            type: list
            elements: raw
            required: true
            description: Primary server address match entries.
      bind_controls:
        type: list
        elements: str
        required: false
        default: []
        description: Native BIND controls entries rendered inside a controls block.
      bind_tls:
        type: list
        elements: dict
        required: false
        default: []
        description:
          - Top-level BIND TLS blocks referenced by DNS-over-TLS, DNS-over-HTTPS, or TLS
            zone transfer configuration.
        options:
          name:
            type: str
            required: true
            description: TLS block name referenced by listener or transfer statements.
          key_file:
            type: str
            required: false
            description: Private key file path rendered as key-file.
          cert_file:
            type: str
            required: false
            description: Certificate file path rendered as cert-file.
          ca_file:
            type: str
            required: false
            description: Certificate authority file path rendered as ca-file.
          dhparam_file:
            type: str
            required: false
            description: Diffie-Hellman parameters file path rendered as dhparam-file.
          ciphers:
            type: str
            required: false
            description: Native BIND ciphers value.
          protocols:
            type: list
            elements: str
            required: false
            description: TLS protocol names rendered inside the protocols block.
          prefer_server_ciphers:
            type: bool
            required: false
            description: Whether server cipher preference is enabled.
          remote_hostname:
            type: str
            required: false
            description: Remote hostname used for TLS certificate verification.
          session_tickets:
            type: bool
            required: false
            description: Whether TLS session tickets are enabled.
      bind_http:
        type: list
        elements: dict
        required: false
        default: []
        description: Top-level BIND HTTP blocks referenced by DNS-over-HTTPS listeners.
        options:
          name:
            type: str
            required: true
            description: HTTP block name referenced by listener statements.
          endpoints:
            type: list
            elements: str
            required: false
            description: HTTP endpoint paths, for example /dns-query.
          listener_clients:
            type: int
            required: false
            description: Maximum number of HTTP listener clients.
          streams_per_connection:
            type: int
            required: false
            description: Maximum number of HTTP streams per connection.
      bind_listeners:
        type: list
        elements: dict
        required: false
        description:
          - BIND listen-on or listen-on-v6 statements rendered inside the options block.
          - Listener entries support classic DNS, DNS-over-TLS, and DNS-over-HTTPS.
        options:
          name:
            type: str
            required: true
            choices:
              - listen-on
              - listen-on-v6
            description: Listener directive name.
          port:
            type: int
            required: false
            description: Listener port.
          tls:
            type: str
            required: false
            description: TLS block name used by DNS-over-TLS or DNS-over-HTTPS listeners.
          http:
            type: str
            required: false
            description: HTTP block name used by DNS-over-HTTPS listeners.
          entries:
            type: list
            elements: raw
            required: true
            description: Address match list entries for the listener.
      bind_options:
        type: list
        elements: dict
        required: false
        description:
          - Ordered BIND option statements rendered inside the options block.
          - Internal defaults, platform defaults, and bind_options are merged with precedence
            internal, platform, then user.
          - Entries with the same name keep the first output position and use the value
            from the last definition.
          - Raw and include entries without a name are opaque and are rendered without deduplication.
          - Set name on a raw or include entry when it should replace an earlier same-name
            option.
          - Empty values omit the matching option.
          - The default includes a rate-limit entry for BIND response rate limiting.
        options:
          name:
            type: str
            required: false
            description: BIND directive name.
          arguments:
            type: raw
            required: false
            description: Arguments rendered between the directive name and an entries block.
          value:
            type: raw
            required: false
            description: Scalar directive value rendered as a native BIND fragment.
          entries:
            type: list
            elements: raw
            required: false
            description: Block entries rendered as native BIND fragments.
          include:
            type: str
            required: false
            description: Include file rendered at the current statement level.
          raw:
            type: raw
            required: false
            description: Raw BIND configuration lines.
      bind_logging:
        type: dict
        required: false
        description:
          - BIND logging configuration with channels and categories.
        options:
          channels:
            type: list
            elements: dict
            required: false
            description: BIND logging channel declarations.
            options:
              name:
                type: str
                required: true
                description: Channel name.
              file:
                type: str
                required: false
                description: Log file path.
              severity:
                type: str
                required: false
                description: Log severity.
              file_options:
                type: str
                required: false
                description: Native BIND file options such as versions and size.
              print_time:
                type: bool
                required: false
                description: Whether log entries include timestamps.
              print_severity:
                type: bool
                required: false
                description: Whether log entries include severity.
              print_category:
                type: bool
                required: false
                description: Whether log entries include category.
          categories:
            type: list
            elements: dict
            required: false
            description: BIND logging category declarations.
            options:
              name:
                type: str
                required: true
                description: Logging category name.
              channels:
                type: list
                elements: str
                required: true
                description: Channel names used by this category.
      bind_includes:
        type: list
        elements: str
        required: false
        default: []
        description: Additional top-level BIND include files rendered after platform default
          includes.
      bind_dlz:
        type: list
        elements: dict
        required: false
        default: []
        description: Top-level BIND DLZ blocks, for example Samba BIND_DLZ integration.
        options:
          name:
            type: str
            required: true
            description: DLZ block name.
          statements:
            type: list
            elements: str
            required: false
            default: []
            description: Native BIND statements rendered inside the DLZ block.
          comment:
            type: str
            required: false
            description: Comment rendered before the DLZ block.
      bind_zones:
        type: list
        elements: dict
        required: false
        default: []
        description:
          - BIND zone declarations for primary, secondary, forward, RPZ, and related zones.
          - Zone file contents are managed directly from this variable for static primary
            zones.
          - Dynamic primary zones can receive an initial bootstrap file, but runtime records
            belong to DDNS updates.
          - The file option is a file name only; the role places it in the platform-native
            directory for the zone type.
        options:
          name:
            type: str
            required: true
            description: Zone name.
          class:
            type: str
            required: false
            description: Optional DNS class, for example IN.
          type:
            type: str
            required: false
            choices:
              - primary
              - secondary
              - forward
              - hint
              - static-stub
              - stub
            description: Zone type such as primary, secondary, forward, hint, or static-stub.
          dynamic:
            type: bool
            required: false
            default: false
            description:
              - Whether the zone is writable by BIND at runtime.
              - Required for update-policy, allow-update, and inline-signing enabled zones.
          file:
            type: str
            required: false
            description:
              - Zone file name without a path component.
              - The role uses platform-native static, dynamic, or secondary zone directories.
          primaries:
            type: list
            elements: raw
            required: false
            description: Primaries block entries for secondary zones.
          allow_update_forwarding:
            type: list
            elements: raw
            required: false
            description: allow-update-forwarding entries.
          allow_update:
            type: list
            elements: raw
            required: false
            description:
              - Classic BIND allow-update entries for dynamic primary zones.
              - Do not combine allow-update and update-policy for the same zone.
          update_policy:
            type: list
            elements: dict
            required: false
            description:
              - Granular BIND update-policy rules for primary zones.
              - Do not combine update-policy and allow-update for the same zone.
            options:
              action:
                type: str
                required: true
                choices:
                  - grant
                  - deny
                description: Whether the rule grants or denies matching updates.
              identity:
                type: str
                required: true
                description: TSIG, SIG(0), or Kerberos identity matched by the rule.
              match_type:
                type: str
                required: true
                choices:
                  - 6to4-self
                  - external
                  - krb5-self
                  - krb5-selfsub
                  - krb5-subdomain
                  - krb5-subdomain-self-rhs
                  - ms-self
                  - ms-selfsub
                  - ms-subdomain
                  - ms-subdomain-self-rhs
                  - name
                  - self
                  - selfsub
                  - selfwild
                  - subdomain
                  - tcp-self
                  - wildcard
                  - zonesub
                description: BIND update-policy rule type.
              name:
                type: str
                required: false
                description: Optional update-policy name field; omitted for rule types such
                  as zonesub.
              types:
                type: list
                elements: raw
                required: true
                description: DNS record types or BIND type limits affected by the rule.
          inline_signing:
            type: bool
            required: false
            description: Whether BIND inline-signing is enabled for the zone.
          forward:
            type: str
            required: false
            description: Zone forward policy.
          forwarders:
            type: list
            elements: raw
            required: false
            description: Zone forwarder entries.
          statements:
            type: list
            elements: str
            required: false
            description: Additional native BIND statements rendered inside the zone block.
          comment:
            type: str
            required: false
            description: Comment rendered before the zone block.
          ttl:
            type: str
            required: false
            default: 1h
            description:
              - Default TTL for the zone file.
              - Uses bind_zone_file_ttl when omitted.
          origin:
            type: str
            required: false
            description: Optional $ORIGIN value.
          primary:
            type: str
            required: false
            description: Primary nameserver used in the SOA record.
          email:
            type: str
            required: false
            description: SOA responsible mailbox in DNS zone format.
          refresh:
            type: str
            required: false
            default: 1h
            description:
              - SOA refresh interval.
              - Uses bind_zone_file_refresh when omitted.
          retry:
            type: str
            required: false
            default: 15m
            description:
              - SOA retry interval.
              - Uses bind_zone_file_retry when omitted.
          expire:
            type: str
            required: false
            default: 1w
            description:
              - SOA expire interval.
              - Uses bind_zone_file_expire when omitted.
          minimum:
            type: str
            required: false
            default: 1d
            description:
              - SOA minimum TTL.
              - Uses bind_zone_file_minimum when omitted.
          records:
            type: list
            elements: dict
            required: false
            description: DNS records for the zone.
            options:
              name:
                type: str
                required: true
                description: Record owner name.
              type:
                type: str
                required: true
                description: DNS record type.
              ttl:
                type: str
                required: false
                description: Record TTL.
              class:
                type: str
                required: false
                description: Optional DNS class, for example IN.
              data:
                type: str
                required: true
                description: Record data.
          bootstrap:
            type: dict
            required: false
            description:
              - Initial zone file content for dynamic primary zones.
              - The file is created only when it does not already exist.
              - Runtime records for dynamic zones are managed through DDNS, not by rewriting
                the zone file.
            options:
              ttl:
                type: str
                required: false
                default: 1h
                description:
                  - Default TTL for the bootstrap zone file.
                  - Uses bind_zone_file_ttl when omitted.
              origin:
                type: str
                required: false
                description: Optional $ORIGIN value.
              primary:
                type: str
                required: true
                description: Primary nameserver used in the SOA record.
              email:
                type: str
                required: true
                description: SOA responsible mailbox in DNS zone format.
              refresh:
                type: str
                required: false
                default: 1h
                description:
                  - SOA refresh interval.
                  - Uses bind_zone_file_refresh when omitted.
              retry:
                type: str
                required: false
                default: 15m
                description:
                  - SOA retry interval.
                  - Uses bind_zone_file_retry when omitted.
              expire:
                type: str
                required: false
                default: 1w
                description:
                  - SOA expire interval.
                  - Uses bind_zone_file_expire when omitted.
              minimum:
                type: str
                required: false
                default: 1d
                description:
                  - SOA minimum TTL.
                  - Uses bind_zone_file_minimum when omitted.
              records:
                type: list
                elements: dict
                required: true
                description: DNS records for the bootstrap zone file.
                options:
                  name:
                    type: str
                    required: true
                    description: Record owner name.
                  type:
                    type: str
                    required: true
                    description: DNS record type.
                  ttl:
                    type: str
                    required: false
                    description: Record TTL.
                  class:
                    type: str
                    required: false
                    description: Optional DNS class, for example IN.
                  data:
                    type: str
                    required: true
                    description: Record data.
      bind_extra_statements:
        type: list
        elements: str
        required: false
        default: []
        description: Additional complete top-level BIND statements for unsupported edge
          cases.
      bind_zone_file_ttl:
        type: str
        required: false
        default: 1h
        description: Default TTL for managed zone files.
      bind_zone_file_refresh:
        type: str
        required: false
        default: 1h
        description: Default SOA refresh interval for managed zone files.
      bind_zone_file_retry:
        type: str
        required: false
        default: 15m
        description: Default SOA retry interval for managed zone files.
      bind_zone_file_expire:
        type: str
        required: false
        default: 1w
        description: Default SOA expire interval for managed zone files.
      bind_zone_file_minimum:
        type: str
        required: false
        default: 1d
        description: Default SOA minimum TTL for managed zone files.
