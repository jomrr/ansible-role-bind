---
# role: bind
# file: defaults/main.yml

# TSIG key files rendered below the platform configuration directory.
bind_tsig_keys: []
# bind_tsig_keys:
#   - name: ddns
#     algorithm: "hmac-sha256"
#     secret: vault_secret

# Named ACL declarations.
bind_acls:
  - name: "local"
    entries:
      - "localhost"
# bind_acls:
#   - name: dns-clients
#     entries:
#       - 127.0.0.1
#       - 192.168.0.0/16

# Named primaries lists used by secondary zones.
bind_primaries: []
# bind_primaries:
#   - name: samba-dlz
#     entries:
#       - 192.168.254.10

# Entries rendered inside the BIND controls block.
bind_controls: []
# bind_controls:
#   - inet 127.0.0.1 port 953 allow { 127.0.0.1; } read-only yes

# BIND directory option override.
# Undefined uses the package-native platform default.
# bind_option_directory: /srv/named

# BIND managed-keys-directory option override.
# Undefined uses the package-native platform default.
# bind_option_managed_keys_directory: /srv/named/dynamic

# BIND dump-file option override.
# Undefined uses the package-native platform default.
# Use an empty value to omit the option on platforms where it is not desired.
# bind_option_dump_file: /var/log/named/dump.db

# BIND memstatistics-file option override.
# Undefined uses the package-native platform default.
# Use an empty value to omit the option on platforms where it is not desired.
# bind_option_memstatistics_file: /var/log/named/mem_stats.txt

# BIND recursing-file option override.
# Undefined uses the package-native platform default.
# Use an empty value to omit the option on platforms where it is not desired.
# bind_option_recursing_file: /var/log/named/recursing

# BIND secroots-file option override.
# Undefined uses the package-native platform default.
# Use an empty value to omit the option on platforms where it is not desired.
# bind_option_secroots_file: /var/log/named/secroots

# BIND statistics-file option override.
# Undefined uses the package-native platform default.
# Use an empty value to omit the option on platforms where it is not desired.
# bind_option_statistics_file: /var/log/named/stats

# BIND pid-file option override.
# Undefined uses the package-native platform default.
# Use an empty value to omit the option on platforms where it is not desired.
# bind_option_pid_file: /run/named/named.pid

# BIND session-keyfile option override.
# Undefined uses the package-native platform default.
# Use an empty value to omit the option on platforms where it is not desired.
# bind_option_session_keyfile: /run/named/session.key

# Ordered statements rendered inside the BIND options block.
bind_options:
  - name: "listen-on"
    arguments: "port 53"
    entries:
      - "127.0.0.1"
  - name: "listen-on-v6"
    arguments: "port 53"
    entries:
      - "none"
  - name: "recursion"
    value: "yes"
  - name: "allow-query"
    entries:
      - "local"
  - name: "allow-recursion"
    entries:
      - "local"
  - name: "allow-transfer"
    entries:
      - "none"
  - name: "dnssec-validation"
    value: "auto"
  - name: "edns-udp-size"
    value: 1232
  - name: "max-udp-size"
    value: 1232
  - name: "max-clients-per-query"
    value: 50
  - name: "tcp-clients"
    value: 100
  - name: "max-cache-size"
    value: "512M"
  - name: "max-cache-ttl"
    value: 86400
  - name: "max-recursion-depth"
    value: 5
  - name: "max-recursion-queries"
    value: 50
  - name: "hostname"
    value: "none"
  - name: "server-id"
    value: "none"
  - name: "minimal-responses"
    value: "yes"
  - name: "version"
    value: "none"
# bind_options:
#   - name: recursion
#     value: "yes"
#   - name: forwarders
#     entries:
#       - 1.1.1.1

# BIND logging channels and categories.
bind_logging:
  channels:
    - name: "default_debug"
      file: "data/named.run"
      severity: "dynamic"
  categories: []
# bind_logging:
#   channels:
#     - name: default_debug
#       file: data/named.run
#       file_options: versions 10 size 128m
#       severity: dynamic
#   categories:
#     - name: queries
#       channels:
#         - default_debug

# Additional top-level include files rendered after platform default includes.
bind_includes: []
# bind_includes:
#   - /etc/named.rfc1912.zones

# BIND DLZ blocks for integrations such as Samba BIND_DLZ primary mode.
bind_dlz: []
# bind_dlz:
#   - name: AD DNS Zone
#     statements:
#       - database "dlopen /usr/lib64/samba/bind9/dlz_bind9.so"

# BIND zone declarations.
bind_zones: []
# bind_zones:
#   - name: example.com
#     class: IN
#     type: secondary
#     primaries:
#       - '"samba-dlz"'
#     file: slaves/db.example.com

# Additional complete top-level BIND statements for unsupported edge cases.
bind_extra_statements: []
# bind_extra_statements:
#   - server 192.0.2.10 { bogus yes; }

# Managed authoritative zone files.
bind_zone_files: []
# bind_zone_files:
#   - name: example.com
#     file: /var/named/zones/db.example.com
#     primary: ns1.example.com
#     email: hostmaster.example.com
#     records:
#       - { name: "@", type: "NS", ttl: "1h", data: "ns1.example.com" }
#       - { name: "ns1", type: "A", ttl: "1h", data: "192.0.2.53" }
#   - name: 2.0.192.in-addr.arpa
#     file: /var/named/zones/db.2.0.192.in-addr.arpa
#     primary: ns1.example.com
#     email: hostmaster.example.com
#     records:
#       - { name: "53", type: "PTR", ttl: "1h", data: "ns1.example.com." }

# Default ownership mode for managed zone files.
bind_zone_file_dynamic: false
# bind_zone_file_dynamic: true

# Default TTL for managed zone files.
bind_zone_file_ttl: "1h"
# bind_zone_file_ttl: 2h

# Default SOA serial for managed zone files.
bind_zone_file_serial: 1
# bind_zone_file_serial: 2024062901

# Default SOA refresh interval for managed zone files.
bind_zone_file_refresh: "1h"
# bind_zone_file_refresh: 2h

# Default SOA retry interval for managed zone files.
bind_zone_file_retry: "15m"
# bind_zone_file_retry: 30m

# Default SOA expire interval for managed zone files.
bind_zone_file_expire: "1w"
# bind_zone_file_expire: 2w

# Default SOA minimum TTL for managed zone files.
bind_zone_file_minimum: "1d"
# bind_zone_file_minimum: 12h

# Default DNS records for managed zone files.
bind_zone_file_records: []
# bind_zone_file_records:
#   - name: "@"
#     type: NS
#     data: ns1.example.com.
