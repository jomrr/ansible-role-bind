---
# role: jomrr.bind
# file: defaults/main.yml

# Desired service state
bind_service:
  state: restarted
  enabled: true

# TSIG keys to be created and included
bind_tsig_keys: []
  # - name: "ddns"
  #   algorithm: "hmac-sha256"

# Default variables for bind
bind_conf:
  acls:
    local:
      - "localhost"
  options:
    hostname: "\"hidden\""
    server-id: "none"
    version: "none"
    "listen-on port 53":
      - "127.0.0.1"
    "listen-on-v6 port 53":
      - "none"
    allow-query:
      - "local"
    allow-recursion:
      - "local"
    disable-empty-zone: "."
    dnssec-validation: "yes"
    forward: only
    forwarders:
      - "127.0.0.1"
    clients-per-query: 10
    tcp-clients: 100
    max-clients-per-query: 50
    max-recursion-depth: 5
    max-recursion-queries: 50
    max-cache-size: "512m"
    max-cache-ttl: "1d"
    edns-udp-size: 1232
    max-udp-size: 1232
    rate-limit:
      - "all-per-second 20"
      - "errors-per-second 5"
      - "nodata-per-second 5"
      - "nxdomains-per-second 5"
      - "responses-per-second 5"
      - "referrals-per-second 5"
      - "ipv4-prefix-length 24"
      - "ipv6-prefix-length 56"
      - "max-table-size 20000"
      - "min-table-size 500"
      - "slip 2"
      - "window 5"
      - "log-only no"
    recursion: "yes"
  logging:
    channels:
      - channel_name: "default_debug"
        file: "data/named.run"
        severity: "dynamic"
        versions: 10
        size: "128m"
        permissions: "0640"
        print_time: true
      - channel_name: "security_file"
        file: "{{ bind_log_dir }}/security.log"
        severity: "dynamic"
        versions: 10
        size: "128m"
        permissions: "0640"
        print_time: true
      - channel_name: "query_file"
        file: "{{ bind_log_dir }}/query.log"
        severity: "dynamic"
        versions: 10
        size: "128m"
        permissions: "0640"
        print_time: true
      - channel_name: "update_file"
        file: "{{ bind_log_dir }}/update.log"
        severity: "dynamic"
        versions: 10
        size: "128m"
        permissions: "0640"
        print_time: true
    categories:
      security: ["security_file"]
      queries: ["query_file"]
      cname: ["query_file"]
      resolver: ["query_file"]
      update: ["update_file"]
      lame-servers: ["null"]
  zones:
    - zone_name: "example.com"
      zone_type: "master"
      zone_file: "zone_fwd_com_example.db"
      zone_options: {}

bind_zone_definitions:
  - name: "example.com"
    primary: "ns1.example.com"
    email: "hostmaster.example.com"
    refresh: "1h"
    retry: "15m"
    expire: "1w"
    minimum: "1d"
    records:
      - { name: "@", type: "NS", ttl: "1h", data: "ns1.example.com" }
      - { name: "@", type: "NS", ttl: "1h", data: "ns2.example.com" }
      - { name: "@", type: "MX", ttl: "1h", data: "10 mail.example.com" }
      - { name: "ns1", type: "A", ttl: "1h", data: "10.0.0.1" }
      - { name: "ns2", type: "A", ttl: "1h", data: "10.0.0.2" }
