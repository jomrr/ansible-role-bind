---
# role: bind
# file: defaults/main.yml

# TSIG key files rendered below the platform configuration directory.
bind_tsig_keys: []
# bind_tsig_keys:
#   - name: ddns
#     algorithm: "hmac-sha256"
#     secret: vault_secret

# Named ACL declarations. The my_addresses ACL is used by the default recursive
# hardening options. The bogons ACL is used by the default blackhole option and
# excludes loopback, private, shared, and ULA ranges commonly used by local clients.
bind_acls:
  - name: "local"
    entries:
      - "localhost"
  - name: "my_addresses"
    entries:
      - "localhost"
  - name: "bogons"
    entries:
      - "0.0.0.0/8"
      - "169.254.0.0/16"
      - "192.0.2.0/24"
      - "198.18.0.0/15"
      - "198.51.100.0/24"
      - "203.0.113.0/24"
      - "224.0.0.0/4"
      - "240.0.0.0/4"
      - "::/128"
      - "::ffff:0:0/96"
      - "100::/64"
      - "2001:db8::/32"
      - "fe80::/10"
      - "ff00::/8"
# bind_acls:
#   - name: dns-clients
#     entries:
#       - 127.0.0.1
#       - 192.168.0.0/16

# Named primaries lists used by secondary zones.
bind_primaries: []
# bind_primaries:
#   - name: samba-dlz
#     entries:
#       - 192.168.254.10

# Entries rendered inside the BIND controls block.
bind_controls: []
# bind_controls:
#   - inet 127.0.0.1 port 953 allow { 127.0.0.1; } read-only yes

# BIND TLS blocks referenced by encrypted listeners or TLS zone transfers.
bind_tls: []
# bind_tls:
#   - name: resolver-tls
#     cert_file: /etc/pki/tls/certs/named.crt
#     key_file: /etc/pki/tls/private/named.key
#     protocols:
#       - TLSv1.3
#       - TLSv1.2
#     session_tickets: false

# BIND HTTP blocks referenced by DNS-over-HTTPS listeners.
bind_http: []
# bind_http:
#   - name: resolver-http
#     endpoints:
#       - /dns-query
#     listener_clients: 100
#     streams_per_connection: 100

# BIND listener statements rendered inside the options block.
bind_listeners:
  - name: "listen-on"
    port: 53
    entries:
      - "127.0.0.1"
  - name: "listen-on-v6"
    port: 53
    entries:
      - "none"
# bind_listeners:
#   - name: listen-on
#     port: 853
#     tls: resolver-tls
#     entries:
#       - any
#   - name: listen-on
#     port: 443
#     tls: resolver-tls
#     http: resolver-http
#     entries:
#       - any

# Ordered statements rendered inside the BIND options block.
# Entries with the same name as package-native options replace those native
# options. Empty values omit the matching native option.
bind_options:
  - name: "recursion"
    value: "yes"
  - name: "qname-minimization"
    value: "strict"
  - name: "deny-answer-addresses"
    entries:
      - "my_addresses"
  - name: "blackhole"
    entries:
      - "bogons"
  - name: "allow-query"
    entries:
      - "local"
  - name: "allow-query-cache"
    entries:
      - "local"
  - name: "allow-recursion"
    entries:
      - "local"
  - name: "allow-transfer"
    entries:
      - "none"
  - name: "dnssec-validation"
    value: "auto"
  - name: "edns-udp-size"
    value: 1232
  - name: "max-udp-size"
    value: 1232
  - name: "max-clients-per-query"
    value: 50
  - name: "tcp-clients"
    value: 100
  - name: "recursive-clients"
    value: 300
  - name: "max-cache-size"
    value: "512M"
  - name: "max-cache-ttl"
    value: 86400
  - name: "max-recursion-depth"
    value: 5
  - name: "max-recursion-queries"
    value: 50
  - name: "fetches-per-server"
    value: "100 fail"
  - name: "fetches-per-zone"
    value: "200 fail"
  - name: "hostname"
    value: "none"
  - name: "server-id"
    value: "none"
  - name: "minimal-responses"
    value: "yes"
  - name: "version"
    value: "none"
# bind_options:
#   - name: recursion
#     value: "yes"
#   - name: qname-minimization
#     value: strict
#   - name: deny-answer-addresses
#     entries:
