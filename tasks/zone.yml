---
# role: bind
# file: tasks/zone.yml

- name: "BIND | Read existing zone file"
  ansible.builtin.command:
    argv:
      - cat
      - "{{ __bind_zone.file_path }}"
  register: __bind_zone_existing
  failed_when: false
  changed_when: false
  check_mode: false

- name: "BIND | Resolve zone serial"
  ansible.builtin.set_fact:
    __bind_zone_serial: >-
      {{
        __bind_zone_existing.stdout
        | default('', true)
        | regex_search(__bind_zone_serial_regexp, '\2')
        | default([ansible_facts.date_time.epoch], true)
        | first
      }}
  changed_when: false

- name: "BIND | Generate zone file"
  ansible.builtin.template:
    src: "zone.j2"
    dest: "{{ __bind_zone.file_path }}"
    owner: "{{ __bind_zone_targets[__bind_zone.target_class].owner }}"
    group: "{{ __bind_zone_targets[__bind_zone.target_class].group }}"
    mode: "{{ __bind_zone_targets[__bind_zone.target_class].mode }}"
    validate: "{{ __bind_checkzone_command }} {{ __bind_zone.name }} %s"
  register: __bind_zone_template
  notify:
    - validate
    - restart

- name: "BIND | Update zone serial"
  ansible.builtin.replace:
    path: "{{ __bind_zone.file_path }}"
    regexp: "{{ __bind_zone_serial_regexp }}"
    replace: '\g<1>{{ [(__bind_zone_serial | int + 1), (ansible_facts.date_time.epoch | int)] | max }}\g<3>'
    validate: "{{ __bind_checkzone_command }} {{ __bind_zone.name }} %s"
  when:
    - __bind_zone_existing.rc == 0
    - __bind_zone_template.changed
