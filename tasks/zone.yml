---
# role: bind
# file: tasks/zone.yml

- name: "BIND | Read existing zone file"
  ansible.builtin.command:
    cmd: "cat {{ __bind_zone_file.file }}"
  register: __bind_zone_existing
  failed_when: false
  changed_when: false
  check_mode: false

- name: "BIND | Resolve zone serial"
  ansible.builtin.set_fact:
    __bind_zone_serial: >-
      {{
        __bind_zone_existing.stdout
        | default('', true)
        | regex_search(__bind_zone_serial_regexp, '\2')
        | default([ansible_facts.date_time.epoch], true)
        | first
      }}
  changed_when: false

- name: "BIND | Generate zone file"
  ansible.builtin.template:
    src: "zone.j2"
    dest: "{{ __bind_zone_file.file }}"
    owner: "{{ __bind_user }}"
    group: "{{ __bind_group }}"
    mode: "0640"
    validate: "{{ __bind_checkzone_command }} {{ __bind_zone_file.name }} %s"
  notify:
    - serial
    - validate
    - restart
