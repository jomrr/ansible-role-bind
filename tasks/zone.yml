---
# role: bind
# file: tasks/zone.yml

- name: "BIND | Create zone directories"
  ansible.builtin.file:
    path: "{{ __bind_zone.file | dirname }}"
    state: directory
    owner: "{{ (__bind_zone.dynamic | default(false)) | ternary(__bind_user, 'root') }}"
    group: "{{ __bind_group }}"
    mode: "0755"
  loop: "{{ bind_zone_definitions }}"
  loop_control:
    loop_var: __bind_zone
    label: "{{ __bind_zone.name }}"

- name: "BIND | Generate zone file"
  ansible.builtin.template:
    src: "zone.j2"
    dest: "{{ __bind_zone.file }}"
    owner: "{{ (__bind_zone.dynamic | default(false)) | ternary(__bind_user, 'root') }}"
    group: "{{ __bind_group }}"
    mode: "0640"
    validate: "{{ __bind_checkzone_command }} {{ __bind_zone.name }} %s"
  loop: "{{ bind_zone_definitions }}"
  loop_control:
    loop_var: __bind_zone
    label: "{{ __bind_zone.name }}"
  notify:
    - "BIND | Validate configuration"
    - "BIND | Restart service"
