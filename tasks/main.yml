---
# role: bind
# file: tasks/main.yml

- name: "BIND | Set os_family variables"
  ansible.builtin.include_vars: "{{ ansible_facts.os_family }}.yml"

- name: "BIND | Set distribution variables"
  ansible.builtin.include_vars: "{{ item }}"
  vars:
    params:
      files:
        - "{{ ansible_facts.distribution }}.yml"
      paths:
        - "vars"
      skip: true
  loop: "{{ query('first_found', params, errors='ignore') }}"

- name: "BIND | Validate zone declarations"
  ansible.builtin.include_tasks: "assert.yml"

- name: "BIND | Set internal facts"
  ansible.builtin.include_tasks: "facts.yml"

- name: "BIND | Install packages"
  ansible.builtin.package:
    name: "{{ __bind_packages }}"
    state: present

- name: "BIND | Generate TSIG key files"
  ansible.builtin.template:
    src: "tsig.j2"
    dest: "{{ __bind_tsig_key_dir }}/{{ __bind_tsig_key.name }}.key"
    owner: root
    group: "{{ __bind_group }}"
    mode: "0640"
  loop: "{{ bind_tsig_keys }}"
  loop_control:
    loop_var: __bind_tsig_key
    label: "{{ __bind_tsig_key.name }}"
  no_log: true
  notify: restart

- name: "BIND | Configure static zone files"
  ansible.builtin.include_tasks: "zone.yml"
  loop: "{{ __bind_effective_zones | selectattr('target_class', 'equalto', 'static') | list }}"
  loop_control:
    loop_var: __bind_zone
    label: "{{ __bind_zone.name }}"

- name: "BIND | Bootstrap dynamic zone files"
  ansible.builtin.template:
    src: "zone.j2"
    dest: "{{ __bind_zone.file_path }}"
    owner: "{{ __bind_zone_targets[__bind_zone.target_class].owner }}"
    group: "{{ __bind_zone_targets[__bind_zone.target_class].group }}"
    mode: "{{ __bind_zone_targets[__bind_zone.target_class].mode }}"
    force: false
    validate: "{{ __bind_checkzone_command }} {{ __bind_zone.name }} %s"
  vars:
    __bind_zone_serial: "1"
  loop: "{{ __bind_effective_zones | selectattr('target_class', 'equalto', 'dynamic') | list }}"
  loop_control:
    loop_var: __bind_zone
    label: "{{ __bind_zone.name }}"
  notify:
    - validate
    - restart

- name: "BIND | Generate options configuration file"
  ansible.builtin.template:
    src: "{{ ansible_facts.os_family }}/named.conf.options.j2"
    dest: "{{ __bind_options_file }}"
    owner: root
    group: "{{ __bind_group }}"
    mode: "0640"
  when: __bind_options_file is defined
  notify:
    - validate
    - restart

- name: "BIND | Generate local configuration file"
  ansible.builtin.template:
    src: "{{ ansible_facts.os_family }}/named.conf.local.j2"
    dest: "{{ __bind_local_file }}"
    owner: root
    group: "{{ __bind_group }}"
    mode: "0640"
  when: __bind_local_file is defined
  notify:
    - validate
    - restart

- name: "BIND | Generate main configuration file"
  ansible.builtin.template:
    src: "{{ ansible_facts.os_family }}/named.conf.j2"
    dest: "{{ __bind_conf_file }}"
    owner: root
    group: "{{ __bind_group }}"
    mode: "0640"
    validate: "{{ __bind_checkconf_command }}"
  notify:
    - validate
    - restart

- name: "BIND | Enable and start service"
  ansible.builtin.systemd_service:
    name: "{{ __bind_service_name }}"
    state: started
    enabled: true
