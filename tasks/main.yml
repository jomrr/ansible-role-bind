---
# role: bind
# file: tasks/main.yml

- name: "BIND | Set os_family variables"
  ansible.builtin.include_vars: "{{ ansible_facts.os_family }}.yml"

- name: "BIND | Set distribution variables"
  ansible.builtin.include_vars: "{{ item }}"
  vars:
    params:
      files:
        - "{{ ansible_facts.distribution }}.yml"
      paths:
        - "vars"
      skip: true
  loop: "{{ query('first_found', params, errors='ignore') }}"

- name: "BIND | Install packages"
  ansible.builtin.package:
    name: "{{ __bind_packages }}"
    state: present

- name: "BIND | Merge effective options"
  # Merge three option sources with precedence internal < platform < user.
  # Per name the highest-precedence definition wins; the option keeps its
  # first-seen position so overrides don't reorder the rendered block.
  # Nameless entries (raw/include) pass through unchanged, in place.
  ansible.builtin.set_fact:
    __bind_effective_options: >-
      {%- set combined = __bind_options + __bind_platform_options + bind_options -%}
      {%- set winner = {} -%}
      {%- for opt in combined if opt.name is defined -%}
        {%- set _ = winner.update({opt.name: opt}) -%}
      {%- endfor -%}
      {%- set acc = namespace(emitted=[], out=[]) -%}
      {%- for opt in combined -%}
        {%- if opt.name is not defined -%}
          {%- set acc.out = acc.out + [opt] -%}
        {%- elif opt.name not in acc.emitted -%}
          {%- set acc.out = acc.out + [winner[opt.name]] -%}
          {%- set acc.emitted = acc.emitted + [opt.name] -%}
        {%- endif -%}
      {%- endfor -%}
      {{ acc.out }}

- name: "BIND | Generate TSIG key files"
  ansible.builtin.template:
    src: "tsig.j2"
    dest: "{{ __bind_tsig_key_dir }}/{{ __bind_tsig_key.name }}.key"
    owner: root
    group: "{{ __bind_group }}"
    mode: "0640"
  loop: "{{ bind_tsig_keys }}"
  loop_control:
    loop_var: __bind_tsig_key
    label: "{{ __bind_tsig_key.name }}"
  no_log: true
  notify: restart

- name: "BIND | Configure zone files"
  ansible.builtin.include_tasks: "zone.yml"
  loop: "{{ bind_zone_files }}"
  loop_control:
    loop_var: __bind_zone_file
    label: "{{ __bind_zone_file.name }}"

- name: "BIND | Generate options configuration file"
  ansible.builtin.template:
    src: "{{ ansible_facts.os_family }}/named.conf.options.j2"
    dest: "{{ __bind_options_file }}"
    owner: root
    group: "{{ __bind_group }}"
    mode: "0640"
  when: __bind_options_file is defined
  notify:
    - validate
    - restart

- name: "BIND | Generate local configuration file"
  ansible.builtin.template:
    src: "{{ ansible_facts.os_family }}/named.conf.local.j2"
    dest: "{{ __bind_local_file }}"
    owner: root
    group: "{{ __bind_group }}"
    mode: "0640"
  when: __bind_local_file is defined
  notify:
    - validate
    - restart

- name: "BIND | Generate main configuration file"
  ansible.builtin.template:
    src: "{{ ansible_facts.os_family }}/named.conf.j2"
    dest: "{{ __bind_conf_file }}"
    owner: root
    group: "{{ __bind_group }}"
    mode: "0640"
    validate: "{{ __bind_checkconf_command }}"
  notify:
    - validate
    - restart

- name: "BIND | Enable and start service"
  ansible.builtin.systemd_service:
    name: "{{ __bind_service_name }}"
    state: started
    enabled: true
